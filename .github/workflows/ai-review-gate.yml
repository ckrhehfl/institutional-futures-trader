name: AI Review Gate

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ai-review-gate-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  report:
    name: AI Review Gate
    runs-on: ubuntu-latest
    env:
      REVIEW_OUTPUT: ai-review-gate-report.json

    steps:
      - name: Check out trusted base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Detect whether Codex review may run
        id: review_policy
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            echo "same_repository=true" >> "$GITHUB_OUTPUT"
          else
            echo "same_repository=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare trusted base review context and PR diff
        id: trusted_context
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ai-review-gate
          cp AGENTS.md .ai-review-gate/AGENTS.md
          cp docs/PR_REVIEW_PLAYBOOK.md .ai-review-gate/PR_REVIEW_PLAYBOOK.md
          cp docs/DEVELOPMENT_ROADMAP.md .ai-review-gate/DEVELOPMENT_ROADMAP.md
          if gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch > .ai-review-gate/pr.diff; then
            echo "diff_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "diff_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create skip report when AI review cannot run safely
        if: steps.review_policy.outputs.same_repository != 'true' || steps.trusted_context.outputs.diff_available != 'true'
        run: |
          cat > "$REVIEW_OUTPUT" <<'JSON'
          {
            "verdict": "NEEDS_OWNER_POLICY",
            "required_check_ready": true,
            "summary": "AI Review Gate skipped because the pull request could not be reviewed safely.",
            "findings": [
              {
                "severity": "P3",
                "classification": "OWNER_DECISION_REQUIRED",
                "file": null,
                "reason": "The AI Review Gate only invokes Codex for same-repository pull requests with an available diff artifact.",
                "recommended_action": "Review fork pull requests manually or inspect why the PR diff could not be collected as text data."
              }
            ],
            "checks": {
              "allowed_files": "needs_review",
              "non_goals": "needs_review",
              "sensitive_data": "needs_review",
              "live_boundary": "needs_review",
              "exchange_independence": "needs_review",
              "runtime_validation": "needs_review",
              "negative_tests": "needs_review",
              "review_triage": "needs_review"
            },
            "owner_decision_required": true
          }
          JSON

      - name: Classify review cost tier
        if: steps.review_policy.outputs.same_repository == 'true' && steps.trusted_context.outputs.diff_available == 'true'
        id: review_cost
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import subprocess

          LOW_RISK_MODEL = "gpt-5.4-mini"
          DEFAULT_MODEL = "gpt-5.4-mini"
          HIGH_RISK_MODEL = "gpt-5.3-codex"
          TRUSTED_POLICY_DOCS = {
              "docs/AI_REVIEW_GATE.md",
              "docs/AUTO_MERGE_POLICY.md",
              "docs/PR_REVIEW_PLAYBOOK.md",
              "docs/LIVE_TRADING_GATE.md",
              "docs/DEVELOPMENT_ROADMAP.md",
          }

          HIGH_RISK_RE = re.compile(
              r"(^\.github/workflows/|"
              r"^\.github/prompts/|"
              r"^AGENTS\.md$|"
              r"^pyproject\.toml$|"
              r"^\.pre-commit-config\.yaml$|"
              r"^\.secrets\.baseline$|"
              r"^\.env[^/]*$|"
              r"(^|/)[^/]*secret[^/]*|"
              r"(^|/)[^/]*credential[^/]*|"
              r"(^|/)[^/]*key[^/]*|"
              r"^src/trading_system/adapters/exchanges/|"
              r"(^|/)[^/]*(oms|risk|live[-_]?trading|live[-_]?enable|live[-_]?gate|model[-_]?live|risk[-_]?cap)[^/]*)",
              re.IGNORECASE,
          )
          HIGH_RISK_LABEL_RE = re.compile(
              r"(security|secret|credential|key|workflow|policy|live|risk|oms|adapter|exchange|bingx)",
              re.IGNORECASE,
          )

          def emit_output(name: str, value: str) -> None:
              safe_value = "".join(
                  character if character == "\t" or ord(character) >= 32 else " "
                  for character in value
              )
              print(f"{name}={safe_value}")

          def emit_routing(tier: str, model: str, effort: str, reason: str) -> None:
              emit_output("risk_tier", tier)
              emit_output("codex_model", model)
              emit_output("codex_effort", effort)
              emit_output("risk_reason", reason)

          def gh_json(*args: str) -> object:
              completed = subprocess.run(
                  ["gh", *args],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              return json.loads(completed.stdout)

          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["GITHUB_REPOSITORY"]
          try:
              files = gh_json("api", "--paginate", f"repos/{repo}/pulls/{pr_number}/files")
              pr = gh_json("pr", "view", pr_number, "--repo", repo, "--json", "labels")
          except Exception:
              emit_routing("high", HIGH_RISK_MODEL, "high", "metadata-unavailable")
              raise SystemExit(0)

          paths = []
          for file_info in files:
              filename = file_info.get("filename")
              previous_filename = file_info.get("previous_filename")
              if filename:
                  paths.append(filename)
              if previous_filename:
                  paths.append(previous_filename)

          labels = [label.get("name", "") for label in pr.get("labels", [])]

          high_risk_path = next((path for path in paths if HIGH_RISK_RE.search(path)), None)
          high_risk_policy_doc = next((path for path in paths if path in TRUSTED_POLICY_DOCS), None)
          high_risk_label = next((label for label in labels if HIGH_RISK_LABEL_RE.search(label)), None)
          docs_only = bool(paths) and all(path.startswith("docs/") or path.endswith(".md") for path in paths)
          solutions_only = bool(paths) and all(path.startswith("docs/solutions/") for path in paths)

          if high_risk_policy_doc:
              emit_routing("high", HIGH_RISK_MODEL, "high", f"high-risk-policy-doc:{high_risk_policy_doc}")
          elif solutions_only:
              emit_routing("low", LOW_RISK_MODEL, "low", "docs-solutions-learning-note")
          elif high_risk_path:
              emit_routing("high", HIGH_RISK_MODEL, "high", f"high-risk-path:{high_risk_path}")
          elif high_risk_label:
              emit_routing("high", HIGH_RISK_MODEL, "high", f"high-risk-label:{high_risk_label}")
          elif docs_only:
              emit_routing("low", LOW_RISK_MODEL, "low", "docs-only")
          else:
              emit_routing("default", DEFAULT_MODEL, "medium", "default")
          PY

      - name: Run Codex AI review
        if: steps.review_policy.outputs.same_repository == 'true' && steps.trusted_context.outputs.diff_available == 'true'
        id: codex_review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ steps.review_cost.outputs.codex_model }}
          effort: ${{ steps.review_cost.outputs.codex_effort }}
          prompt-file: .github/prompts/ai-review-gate.md
          sandbox: read-only
          safety-strategy: drop-sudo
        continue-on-error: true

      - name: Write Codex JSON report
        if: steps.review_policy.outputs.same_repository == 'true' && steps.trusted_context.outputs.diff_available == 'true'
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex_review.outputs.final-message }}
        run: |
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > "$REVIEW_OUTPUT"

      - name: Normalize missing Codex output
        if: always() && hashFiles('ai-review-gate-report.json') == ''
        run: |
          cat > "$REVIEW_OUTPUT" <<'JSON'
          {
            "verdict": "NEEDS_OWNER_POLICY",
            "required_check_ready": true,
            "summary": "AI Review Gate did not produce a JSON report.",
            "findings": [
              {
                "severity": "P2",
                "classification": "OWNER_DECISION_REQUIRED",
                "file": null,
                "reason": "The AI Review Gate completed without the expected JSON artifact.",
                "recommended_action": "Inspect the Codex action logs before treating this gate as passing."
              }
            ],
            "checks": {
              "allowed_files": "needs_review",
              "non_goals": "needs_review",
              "sensitive_data": "needs_review",
              "live_boundary": "needs_review",
              "exchange_independence": "needs_review",
              "runtime_validation": "needs_review",
              "negative_tests": "needs_review",
              "review_triage": "needs_review"
            },
            "owner_decision_required": true
          }
          JSON

      - name: Normalize invalid Codex JSON
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          VALID_VERDICTS = {"PASS", "FAIL", "NEEDS_OWNER_POLICY"}
          REQUIRED_CHECKS = {
              "allowed_files",
              "non_goals",
              "sensitive_data",
              "live_boundary",
              "exchange_independence",
              "runtime_validation",
              "negative_tests",
              "review_triage",
          }

          FALLBACK_REPORT = {
              "verdict": "NEEDS_OWNER_POLICY",
              "required_check_ready": True,
              "summary": "AI Review Gate produced invalid JSON shape and was normalized to an owner decision.",
              "findings": [
                  {
                      "severity": "P2",
                      "classification": "OWNER_DECISION_REQUIRED",
                      "file": None,
                      "reason": "The Codex report did not match the expected JSON object contract.",
                      "recommended_action": "Inspect the raw workflow logs before treating this gate as passing.",
                  }
              ],
              "checks": {
                  "allowed_files": "needs_review",
                  "non_goals": "needs_review",
                  "sensitive_data": "needs_review",
                  "live_boundary": "needs_review",
                  "exchange_independence": "needs_review",
                  "runtime_validation": "needs_review",
                  "negative_tests": "needs_review",
                  "review_triage": "needs_review",
              },
              "owner_decision_required": True,
          }

          path = Path("ai-review-gate-report.json")
          try:
              report = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if not isinstance(report, dict):
              path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if report.get("verdict") not in VALID_VERDICTS:
              path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
              raise SystemExit(0)

          findings = report.get("findings")
          if not isinstance(findings, list):
              path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if any(not isinstance(finding, dict) for finding in findings):
              path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if report.get("verdict") == "PASS":
              checks = report.get("checks")
              if not isinstance(checks, dict):
                  path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
                  raise SystemExit(0)

              if report.get("owner_decision_required") is not False:
                  path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
                  raise SystemExit(0)

              if set(checks) != REQUIRED_CHECKS:
                  path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
                  raise SystemExit(0)

              if any(value != "pass" for value in checks.values()):
                  path.write_text(json.dumps(FALLBACK_REPORT, indent=2) + "\n", encoding="utf-8")
                  raise SystemExit(0)
          PY

      - name: Annotate review routing metadata
        if: always()
        env:
          RISK_TIER: ${{ steps.review_cost.outputs.risk_tier || 'not-run' }}
          CODEX_MODEL: ${{ steps.review_cost.outputs.codex_model || 'not-run' }}
          CODEX_EFFORT: ${{ steps.review_cost.outputs.codex_effort || 'not-run' }}
          RISK_REASON: ${{ steps.review_cost.outputs.risk_reason || 'not-run' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("ai-review-gate-report.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          report["review_routing"] = {
              "risk_tier": os.environ["RISK_TIER"],
              "model": os.environ["CODEX_MODEL"],
              "effort": os.environ["CODEX_EFFORT"],
              "reason": os.environ["RISK_REASON"],
          }
          path.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Write job summary
        if: always()
        run: |
          echo "## AI Review Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("ai-review-gate-report.json").read_text(encoding="utf-8"))
          print(f"- Verdict: `{report.get('verdict', 'NEEDS_OWNER_POLICY')}`")
          print(f"- Required-check-ready: `{report.get('required_check_ready', True)}`")
          print(f"- Owner decision required: `{report.get('owner_decision_required', False)}`")
          routing = report.get("review_routing", {})
          print(f"- Risk tier: `{routing.get('risk_tier', 'not-run')}`")
          print(f"- Model: `{routing.get('model', 'not-run')}`")
          print(f"- Effort: `{routing.get('effort', 'not-run')}`")
          print(f"- Routing reason: `{routing.get('reason', 'not-run')}`")
          print(f"- Summary: {report.get('summary', 'No summary provided.')}")
          print("")
          print("### Findings")
          findings = report.get("findings", [])
          if not findings:
              print("- None")
          for finding in findings:
              severity = finding.get("severity", "P3")
              classification = finding.get("classification", "OPTIONAL_OR_STYLE")
              file_path = finding.get("file") or "n/a"
              reason = finding.get("reason", "")
              action = finding.get("recommended_action", "")
              print(f"- `{severity}` `{classification}` `{file_path}`: {reason} Recommended action: {action}")
          PY

      - name: Upload raw JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-gate-report
          path: ${{ env.REVIEW_OUTPUT }}
          if-no-files-found: error

      - name: Enforce AI review verdict
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          REQUIRED_CHECKS = {
              "allowed_files",
              "non_goals",
              "sensitive_data",
              "live_boundary",
              "exchange_independence",
              "runtime_validation",
              "negative_tests",
              "review_triage",
          }

          report = json.loads(Path("ai-review-gate-report.json").read_text(encoding="utf-8"))
          verdict = report.get("verdict", "NEEDS_OWNER_POLICY")
          checks = report.get("checks", {})
          checks_pass = (
              isinstance(checks, dict)
              and set(checks) == REQUIRED_CHECKS
              and all(value == "pass" for value in checks.values())
          )
          owner_clear = report.get("owner_decision_required") is False
          if verdict == "PASS" and checks_pass and owner_clear:
              print("AI Review Gate verdict PASS; workflow succeeds.")
              raise SystemExit(0)

          print(f"AI Review Gate verdict {verdict}; workflow fails until the issue is resolved or owner policy is recorded.")
          raise SystemExit(1)
          PY

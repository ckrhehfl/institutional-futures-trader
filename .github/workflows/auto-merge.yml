name: Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
      - labeled
      - unlabeled
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      BASE_REPO: ${{ github.repository }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      IS_DRAFT: ${{ github.event.pull_request.draft }}
      PR_STATE: ${{ github.event.pull_request.state }}
      BLOCKING_LABELS: do-not-merge,blocked,owner-decision-required,security-review-required,manual-merge-only
      MIN_PR_AGE_SECONDS: 600
      MIN_HEAD_AGE_SECONDS: 300

    steps:
      - name: Check eligibility
        id: eligibility
        run: |
          set -euo pipefail

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "reason=eligible" >> "$GITHUB_OUTPUT"

          set_ineligible() {
            local reason="$1"

            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
            exit 0
          }

          disable_auto_merge_if_enabled() {
            local reason="$1"
            local auto_merge_enabled

            if ! auto_merge_enabled="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')"; then
              set_ineligible "auto-merge-state-unavailable"
            fi

            if [ "$auto_merge_enabled" = "true" ]; then
              if ! gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --disable-auto; then
                set_ineligible "settling-disable-auto-failed-$reason"
              fi
            fi
          }

          settle_until_old_enough() {
            local timestamp="$1"
            local minimum_age_seconds="$2"
            local reason="$3"
            local now_epoch timestamp_epoch age_seconds
            local wait_seconds

            now_epoch="$(date -u +%s)"
            timestamp_epoch="$(date -u -d "$timestamp" +%s)"
            age_seconds=$((now_epoch - timestamp_epoch))
            if [ "$age_seconds" -lt "$minimum_age_seconds" ]; then
              wait_seconds=$((minimum_age_seconds - age_seconds))
              echo "Settling $reason for ${wait_seconds}s before enabling auto-merge."
              disable_auto_merge_if_enabled "$reason"
              sleep "$wait_seconds"
            fi
          }

          settle_for_seconds() {
            local wait_seconds="$1"
            local reason="$2"

            echo "Settling $reason for ${wait_seconds}s before enabling auto-merge."
            disable_auto_merge_if_enabled "$reason"
            sleep "$wait_seconds"
          }

          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            set_ineligible "fork-or-external-pr"
          fi

          if [ "$BASE_REF" != "main" ]; then
            set_ineligible "non-main-base"
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            set_ineligible "draft-pr"
          fi

          if [ "$PR_STATE" != "open" ]; then
            set_ineligible "not-open"
          fi

          if ! pr_metadata="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json createdAt,labels --jq '[.createdAt, ([.labels[].name] | join(","))] | @tsv')"; then
            set_ineligible "metadata-unavailable"
          fi

          IFS=$'\t' read -r pr_created_at labels <<< "$pr_metadata"

          IFS=',' read -r -a blockers <<< "$BLOCKING_LABELS"
          for label in "${blockers[@]}"; do
            if printf ',%s,' "$labels" | grep -Fq ",$label,"; then
              set_ineligible "blocking-label-$label"
            fi
          done

          if ! changed_files="$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[] | .filename, (.previous_filename // empty)')"; then
            set_ineligible "changed-files-unavailable"
          fi

          high_risk_pattern='(^\.github/workflows/|^\.github/prompts/|^AGENTS\.md$|^docs/(AI_REVIEW_GATE|AUTO_MERGE_POLICY|PR_REVIEW_PLAYBOOK|LIVE_TRADING_GATE|DEVELOPMENT_ROADMAP)\.md$|^\.pre-commit-config\.yaml$|^pyproject\.toml$|^\.secrets\.baseline$|^\.env[^/]*$|(^|/)[^/]*secret[^/]*/?|(^|/)[^/]*credential[^/]*/?|(^|/)[^/]*key[^/]*/?|^src/trading_system/adapters/exchanges/|(^|/)[^/]*(live[-_]?trading|live[-_]?enable|live[-_]?gate|model[-_]?live|risk[-_]?cap)[^/]*/?)'
          if printf '%s\n' "$changed_files" | grep -Ei "$high_risk_pattern" >/dev/null; then
            set_ineligible "high-risk-files"
          fi

          settle_until_old_enough "$pr_created_at" "$MIN_PR_AGE_SECONDS" "pr-age"

          settle_for_seconds "$MIN_HEAD_AGE_SECONDS" "head-update"

      - name: Enable GitHub auto-merge
        if: steps.eligibility.outputs.eligible == 'true' && github.event.action != 'closed'
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --match-head-commit "$HEAD_SHA"

      - name: Disable GitHub auto-merge when ineligible
        if: steps.eligibility.outputs.eligible != 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if ! auto_merge_enabled="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')"; then
            echo "Unable to read GitHub auto-merge state for PR $PR_NUMBER."
            exit 1
          fi

          if [ "$auto_merge_enabled" != "true" ]; then
            echo "GitHub auto-merge was already disabled or unavailable for PR $PR_NUMBER."
            exit 0
          fi

          if gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --disable-auto; then
            echo "Disabled GitHub auto-merge for ineligible PR $PR_NUMBER."
          else
            echo "GitHub auto-merge was enabled but could not be disabled for PR $PR_NUMBER."
            exit 1
          fi

      - name: Write summary
        if: always()
        run: |
          echo "## Auto Merge" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Eligible: \`${{ steps.eligibility.outputs.eligible || 'false' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reason: \`${{ steps.eligibility.outputs.reason || 'not-evaluated' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: \`$PR_NUMBER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Head SHA: \`$HEAD_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow only enables GitHub auto-merge. Branch protection and required checks still decide whether the PR can merge." >> "$GITHUB_STEP_SUMMARY"
